<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#2E7D32">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="ScoreCraft">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icons/icon-192.png" sizes="192x192">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <title>分析 | ScoreCraft</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>🏌️ ScoreCraft</h1>
        <p>スコア分析</p>
    </header>

    <main>
        <section class="card">
            <div class="section-heading">
                <div>
                    <h2>パフォーマンス</h2>
                    <p class="section-description">保存したラウンドを自動集計します。</p>
                </div>
                <span id="analysisRoundCount" class="history-count">0回</span>
            </div>
            <div id="analysisSummary" class="analysis-summary-grid">読み込み中...</div>
        </section>

        <section class="card">
            <div class="section-heading">
                <div>
                    <h2>スコア推移</h2>
                    <p class="section-description">古いラウンドから順に表示します。</p>
                </div>
            </div>
            <div id="scoreChartArea" class="score-chart-area">
                <canvas id="scoreChart" aria-label="スコア推移グラフ"></canvas>
            </div>
        </section>

        <section class="card">
            <div class="section-heading">
                <div>
                    <h2>最近5ラウンド</h2>
                    <p class="section-description">直近のスコアを確認できます。</p>
                </div>
            </div>
            <div id="recentAnalysisRounds">読み込み中...</div>
        </section>

        <section class="card">
            <div class="section-heading">
                <div>
                    <h2>ティーショット方向</h2>
                    <p class="section-description">方向を入力したホールのみ集計します。</p>
                </div>
            </div>
            <div id="directionAnalysis">読み込み中...</div>
        </section>

        <section class="card">
            <div class="section-heading">
                <div>
                    <h2>使用クラブ分析</h2>
                    <p class="section-description">ティーショットで使用したクラブの割合です。</p>
                </div>
            </div>
            <div id="clubAnalysis">読み込み中...</div>
        </section>
    </main>

    <div id="navigation"></div>

    <script src="js/app.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/navigation.js"></script>
    <script src="js/analysis.js"></script>
</body>
</html>
