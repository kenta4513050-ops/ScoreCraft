<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#2E7D32">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="ScoreCraft">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icons/icon-192.png" sizes="192x192">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <title>分析 | ScoreCraft</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header><h1>🏌️ ScoreCraft</h1><p>スコア分析</p></header>
    <main>
        <section class="card">
            <div class="section-heading"><div><h2>パフォーマンス</h2><p class="section-description">保存したラウンドを自動集計します。</p></div><span id="analysisRoundCount" class="history-count">0回</span></div>
            <div id="analysisSummary" class="analysis-summary-grid">読み込み中...</div>
        </section>

        <section class="card">
            <div class="section-heading"><div><h2>スコア推移</h2><p class="section-description">スコア・パット数・平均パット距離をラウンドごとに表示します。</p></div></div>
            <div class="analysis-chart-legend" aria-hidden="true"><span>● スコア</span><span>● パット数</span><span>● 平均距離（歩）</span></div>
            <div id="scoreChartArea" class="score-chart-area"><canvas id="scoreChart" aria-label="スコア、パット数、平均パット距離の推移グラフ"></canvas></div>
        </section>

        <section class="card">
            <div class="section-heading"><div><h2>ティーショット使用クラブ</h2><p class="section-description">Par4・5とPar3に分けて使用率を表示します。クラブをタップすると方向割合を確認できます。</p></div></div>
            <div id="clubAnalysis">読み込み中...</div>
        </section>

        <section class="card">
            <div class="section-heading"><div><h2>パット距離別 平均パット数</h2><p class="section-description">ファーストパット距離（歩数）ごとの平均パット数です。</p></div></div>
            <div id="puttDistanceAnalysis">読み込み中...</div>
        </section>
    </main>
    <div id="navigation"></div>
    <script src="js/app.js"></script><script src="js/storage.js"></script><script src="js/navigation.js"></script><script src="js/analysis.js"></script>
</body>
</html>
