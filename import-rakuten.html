<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#2E7D32">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>ScoreCraft - 過去ラウンド入力 Ver1.3.4</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="app-header">
  <h1>📝 過去ラウンド入力</h1>
  <p>スクリーンショットを見ながら、正確に素早く登録</p>
</header>
<main class="rakuten-import-page">
  <section class="card">
    <h2>1. 参考画像を選択</h2>
    <p class="section-description">楽天などのスコアカード画像を1～2枚表示できます。画像は端末内で表示するだけで、外部へ送信しません。</p>
    <label class="image-picker" for="referenceImages">
      <span class="image-picker-icon">🖼️</span>
      <strong>写真ライブラリから選択</strong>
      <span>JPEG・PNG／最大2枚</span>
    </label>
    <input id="referenceImages" type="file" accept="image/*" multiple hidden>
    <div id="imagePreviewList" class="import-image-preview-list reference-image-sticky" aria-live="polite"></div>
  </section>

  <section class="card">
    <h2>2. 入力項目を選択</h2>
    <div class="past-mode-selector" id="pastModeSelector">
      <button type="button" data-mode="simple">シンプル</button>
      <button type="button" data-mode="standard">スタンダード</button>
      <button type="button" data-mode="custom">カスタム</button>
    </div>
    <p id="modeDescription" class="section-description"></p>
  </section>

  <section class="card">
    <h2>3. ラウンド情報を入力</h2>
    <div class="import-form-grid">
      <label>ラウンド日<input id="roundDate" type="date"></label>
      <label>ゴルフ場名<input id="courseName" type="text" placeholder="例：上総富士ゴルフクラブ"></label>
      <label>前半コース<input id="frontCourse" type="text" placeholder="例：東コース"></label>
      <label>後半コース<input id="backCourse" type="text" placeholder="例：西コース"></label>
      <label>ティー<input id="teeName" type="text" placeholder="例：REGULAR"></label>
      <label>グリーン<input id="greenName" type="text" placeholder="例：A"></label>
    </div>
    <div class="quick-entry-box">
      <h3>9ホール一括入力</h3>
      <p id="quickEntryGuide">数字を区切らず9桁で入力できます。</p>
      <div id="clubIdGuide" class="club-id-guide" aria-live="polite"></div>
      <div class="quick-entry-grid">
        <label>対象<select id="quickHalf"><option value="front">前半 1～9H</option><option value="back">後半 10～18H</option></select></label>
        <label>項目<select id="quickField"><option value="par">PAR</option><option value="score">スコア</option><option value="putts">パット</option><option value="teeClub">クラブ番号</option><option value="ob">OB</option><option value="onePenalty">1ペナ</option><option value="bunker">バンカー</option></select></label>
        <label class="quick-value-label">連続値<input id="quickValue" inputmode="numeric" placeholder="例：434543445" autocomplete="off"></label>
        <button id="applyQuickButton" class="secondary-button" type="button">反映</button>
      </div>
    </div>
    <div class="import-summary-grid">
      <div><span>PAR</span><strong id="previewPar">-</strong></div>
      <div><span>スコア</span><strong id="previewScore">-</strong></div>
      <div><span>パット</span><strong id="previewPutts">-</strong></div>
      <div><span>OB</span><strong id="previewOb">-</strong></div>
    </div>
    <div class="table-scroll">
      <table class="import-hole-table">
        <thead id="holeTableHead"></thead>
        <tbody id="holeTableBody"></tbody>
      </table>
    </div>
    <div id="courseSaveNotice" class="course-save-notice"></div>
    <label class="checkbox-row"><input id="saveCourseCheck" type="checkbox" checked> 未登録の場合、18ホールのPAR情報をゴルフ場管理にも保存する</label>
    <div id="importMessage" class="data-message" aria-live="polite"></div>
    <button id="saveImportedRoundButton" class="btn" type="button">💾 ラウンド履歴へ保存</button>
    <button id="resetImportButton" class="secondary-button data-action-button" type="button">入力をリセット</button>
  </section>
</main>
<div id="navigation"></div>
<script src="js/storage.js"></script>
<script src="js/config.js"></script>
<script src="js/courseDatabase.js"></script>
<script src="js/navigation.js"></script>
<script src="js/rakutenImport.js"></script>
</body>
</html>
