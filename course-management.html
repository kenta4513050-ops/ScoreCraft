<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"><meta name="theme-color" content="#2E7D32"><link rel="manifest" href="manifest.webmanifest"><link rel="stylesheet" href="css/style.css"><title>ScoreCraft - ゴルフ場管理</title></head><body><header><h1>⛳ ゴルフ場管理</h1><p>ゴルフ場と18ホールのPARを登録</p></header><main>
<section class="card"><div class="section-heading"><div><h2>登録済みゴルフ場</h2><p class="section-description">登録したゴルフ場を編集・削除できます。</p></div></div><div id="courseList" class="course-manager-list"></div></section>
<section class="card" id="courseFormCard"><h2 id="formTitle">新しいゴルフ場を追加</h2><input id="editingCourseId" type="hidden"><label>ゴルフ場名<input id="courseName" type="text" placeholder="例：○○カントリークラブ"></label><label>都道府県<input id="prefecture" type="text" placeholder="例：神奈川県"></label><label>コース名<input id="courseNameDetail" type="text" placeholder="例：OUT / IN、東コース"></label><div class="par-toolbar"><button id="setPar72Button" class="secondary-button" type="button">標準PAR72を入力</button><button id="clearParButton" class="secondary-button" type="button">PARをクリア</button></div><div id="parGrid" class="par-input-grid"></div><div class="par-total-box"><span>OUT <strong id="outPar">0</strong></span><span>IN <strong id="inPar">0</strong></span><span>TOTAL <strong id="totalPar">0</strong></span></div><div class="course-form-actions"><button id="saveCourseButton" class="btn" type="button">💾 ゴルフ場を保存</button><button id="cancelEditButton" class="secondary-button" type="button" hidden>編集をキャンセル</button></div><div id="courseMessage" class="data-message" aria-live="polite"></div></section>
</main><div id="navigation"></div><script src="js/app.js"></script><script src="js/storage.js"></script><script src="js/navigation.js"></script><script src="js/courseDatabase.js"></script><script src="js/courseManagement.js"></script></body></html>
