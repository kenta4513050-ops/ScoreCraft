<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#2E7D32">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="ScoreCraft">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icons/icon-192.png" sizes="192x192">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <title>ラウンド履歴 | ScoreCraft</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>🏌️ ScoreCraft</h1>
        <p>ラウンド履歴</p>
    </header>

    <main>
        <section class="card">
            <div class="section-heading">
                <div>
                    <h2>ラウンド履歴</h2>
                    <p class="section-description">保存したラウンドを確認できます。</p>
                </div>
                <span id="historyCount" class="history-count">0回</span>
            </div>

            <div class="history-filter-area">
                <label for="historySearch">ゴルフ場名で検索</label>
                <input
                    id="historySearch"
                    type="search"
                    placeholder="ゴルフ場名を入力"
                    autocomplete="off"
                >
            </div>

            <div id="historyList">読み込み中...</div>
        </section>

        <section id="roundDetailSection" class="card" hidden>
            <div class="section-heading">
                <h2>ラウンド詳細</h2>
                <button id="closeDetailButton" class="secondary-button compact-button" type="button">
                    閉じる
                </button>
            </div>

            <div id="roundDetail"></div>

            <div class="round-detail-actions">
                <button id="editRoundButton" class="primary-button" type="button">
                    このラウンドを編集
                </button>
                <button id="deleteRoundButton" class="danger-button" type="button">
                    このラウンドを削除
                </button>
            </div>
        </section>
    </main>

    <div id="navigation"></div>

    <script src="js/app.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/navigation.js"></script>
    <script src="js/history.js"></script>
</body>
</html>
