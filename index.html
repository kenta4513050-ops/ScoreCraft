<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#2E7D32">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="ScoreCraft">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icons/icon-192.png" sizes="192x192">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <title>ScoreCraft</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>🏌️ ScoreCraft</h1>
        <p>Record. Analyze. Improve.</p>
    </header>

    <main>
        <section class="card welcome-card">
            <h2>ホーム</h2>
            <p>ラウンドを記録して、スコアの変化を確認しましょう。</p>
        </section>

        <section class="card">
            <div class="section-heading">
                <h2>ダッシュボード</h2>
            </div>
            <div id="dashboard">読み込み中...</div>
        </section>

        <section class="card">
            <div class="section-heading">
                <h2>最近のラウンド</h2>
            </div>
            <div id="recentRounds">読み込み中...</div>
        </section>

        <section class="card">
            <h2>クイックメニュー</h2>
            <button class="btn" type="button" onclick="location.href='round.html'">
                ⛳ 新しいラウンドを入力
            </button>
        </section>
    </main>

    <div id="navigation"></div>

    <script src="js/app.js"></script>
    <script src="js/config.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/navigation.js"></script>
    <script src="js/index.js"></script>
</body>
</html>
